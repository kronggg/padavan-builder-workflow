name: Build one firmware

on:
  workflow_call:
    inputs:
      model:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Get variables and config
      run: |
        . <(cat variables)

        CONFIG_FILE="configs/${{ inputs.model }}.config"
        if [[ ! -f "$CONFIG_FILE" ]]; then
          echo "Config file not found: $CONFIG_FILE"
          exit 1
        fi

        while IFS='=' read -r key value; do
          [[ "$key" =~ ^CONFIG_ ]] && echo "$key=$value" >> $GITHUB_ENV
        done < "$CONFIG_FILE"

        for v in "${!PADAVAN_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

        echo "MODEL=${{ inputs.model }}" >> $GITHUB_ENV

    - name: Check firmware partition limit (pre-build info)
      run: |
        VENDOR="$CONFIG_VENDOR"
        PRODUCT="$CONFIG_FIRMWARE_PRODUCT_ID"
        echo "Model: ${{ inputs.model }}"
        echo "Vendor: $VENDOR"
        echo "Product: $PRODUCT"

        git clone --depth 1 -b "$PADAVAN_BRANCH" "$PADAVAN_REPO" upstream-check 2>/dev/null
        if [[ -d upstream-check ]]; then
          PART_FILE="upstream-check/trunk/configs/boards/${VENDOR}/${PRODUCT}/partitions.config"
          if [[ -f "$PART_FILE" ]]; then
            cat "$PART_FILE"
            MAX_SIZE=$(grep -oP 'mtd_firmware_size\s*=\s*\K\d+' "$PART_FILE" || \
                       grep -oP 'mtd_firmware_start\s*=\s*\K\d+' "$PART_FILE" || echo "0")
            if [[ "$MAX_SIZE" != "0" ]]; then
              MAX_SIZE_MB=$(awk "BEGIN { printf \"%.1f\", $MAX_SIZE / 1048576 }")
              echo "Firmware partition limit: $MAX_SIZE bytes (~${MAX_SIZE_MB} MB)"
              echo "MAX_FW_SIZE=$MAX_SIZE" >> $GITHUB_ENV
            fi
          else
            echo "Warning: partitions.config not found at $PART_FILE"
          fi
          rm -rf upstream-check
        else
          echo "Warning: upstream clone failed, skipping partition check"
        fi

    - name: Download sources and toolchain
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

    - name: Install themes
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed
          for theme in $PADAVAN_THEMES; do
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Run custom pre-build script
      run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

    - name: Build firmware
      run: |
        # Normalize line endings (CRLF -> LF) in case config was uploaded with Windows line endings
        sed -i 's/\r$//' "configs/${{ inputs.model }}.config"
        cp "configs/${{ inputs.model }}.config" padavan-ng/trunk/.config
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh
        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex '.*\.(trx|bin)$' \
                        -printf '%T@\t%f\n' | sort -V | tail -1 | cut -f2)"
        if [[ -z "$FW_FILE_NAME" ]]; then
          echo "Firmware file not found"
          exit 1
        fi
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    - name: Run custom post-build script
      run: '[[ -f post-build.sh ]] && . post-build.sh || :'

    - name: Prepare artifacts
      run: |
        mkdir -p "${{ inputs.model }}"
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" "${{ inputs.model }}/firmware-${{ inputs.model }}.trx"
        cp "configs/${{ inputs.model }}.config" "${{ inputs.model }}/${{ inputs.model }}.config"
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Check firmware size (post-build, blocking)
      run: |
        FW_FILE="${{ inputs.model }}/firmware-${{ inputs.model }}.trx"
        fw_size="$(stat -c %s "$FW_FILE")"
        max_fw_size="${{ env.MAX_FW_SIZE }}"
        if [[ -z "$max_fw_size" || "$max_fw_size" == "0" ]]; then
          echo "Warning: MAX_FW_SIZE not set, skipping size check"
          exit 0
        fi
        fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
        max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
        echo "Firmware size: $fw_size_fmtd"
        echo "Partition limit: $max_fw_size_fmtd"
        if ((fw_size > max_fw_size)); then
          echo "FAIL: Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for ${{ inputs.model }}"
          exit 1
        fi
        echo "OK: Firmware fits within partition limit"

    - name: Generate changelog
      run: |
        CHANGELOG="${{ inputs.model }}/CHANGELOG.md"
        echo "# Changelog for ${{ inputs.model }}" > "$CHANGELOG"
        echo "" >> "$CHANGELOG"
        echo "Build date: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> "$CHANGELOG"
        echo "Upstream: nilabsent/padavan-ng" >> "$CHANGELOG"
        echo "" >> "$CHANGELOG"
        if [[ -n "${{ github.ref_name }}" && "${{ github.ref_name }}" =~ ^v ]]; then
          echo "Tag: ${{ github.ref_name }}" >> "$CHANGELOG"
          PREV_TAG=$(git tag --sort=-version:refname | head -1)
          if [[ -n "$PREV_TAG" && "$PREV_TAG" != "${{ github.ref_name }}" ]]; then
            echo "" >> "$CHANGELOG"
            git log --oneline "$PREV_TAG".."${{ github.ref_name }}" >> "$CHANGELOG" 2>/dev/null || true
          fi
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.model }}-${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: ${{ inputs.model }}/

    - name: Create Release
      if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Padavan ${{ github.ref_name }}
        body_path: ${{ inputs.model }}/CHANGELOG.md
        files: |
          ${{ inputs.model }}/firmware-${{ inputs.model }}.trx
          ${{ inputs.model }}/${{ inputs.model }}.config
          ${{ inputs.model }}/CHANGELOG.md
        make_latest: false
